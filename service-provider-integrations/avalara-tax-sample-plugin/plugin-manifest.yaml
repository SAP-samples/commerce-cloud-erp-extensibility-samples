name: Avalara Tax Sample
version: 1.0.7
sourceSubscriptionCode: "tenantAvalara"
sourceEnvironmentCode: "avalaratest"
description: Avalara Tax Sample Plugin
author: Jane Doe
license: Apache-2.0
homepage: https://github.tools.sap/I319024/commerce-cloud-saas-samples
repository: https://github.tools.sap/I319024/commerce-cloud-saas-samples
logo: https://my-charity-roundup.com/logo.svg
keywords: [charity, rounding, pricing]
pluginId: avalaraTaxSample
components:
